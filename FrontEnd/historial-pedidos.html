<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos | Flics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .history-header {
            text-align: center;
            padding: 40px 0 20px;
        }
        .history-header h1 { font-size: 2rem; }
        .order-card {
            background: white;
            border-radius: var(--border-radius);
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
        }
        .order-card-header:hover { background: #f1f5f9; }
        .order-card-header .order-id { font-weight: 700; color: var(--primary-color); }
        .order-card-header .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-Pendiente { background: #fef3c7; color: #d97706; }
        .status-Preparacion { background: #dbeafe; color: #2563eb; }
        .status-Listo { background: #d1fae5; color: #059669; }
        .status-Entregado { background: #e0e7ff; color: #4f46e5; }
        .status-Cancelado { background: #fee2e2; color: #dc2626; }
        .order-card-body { padding: 0 20px; }
        .order-summary {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .order-summary span:last-child { font-weight: 600; color: var(--text-color); }
        .timeline-section { padding: 15px 0; }
        .timeline-section h4 {
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text-color);
        }
        .timeline {
            position: relative;
            padding-left: 28px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: #e2e8f0;
        }
        .timeline-item {
            position: relative;
            padding-bottom: 16px;
        }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-dot {
            position: absolute;
            left: -22px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 2px solid white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }
        .timeline-item:last-child .timeline-dot { background: #22c55e; box-shadow: 0 0 0 2px #22c55e; }
        .timeline-content {
            font-size: 0.9rem;
        }
        .timeline-content .tl-status {
            font-weight: 600;
            color: var(--text-color);
        }
        .timeline-content .tl-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .no-orders {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .no-orders i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        .order-items-list {
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 8px 0;
        }
        .order-items-list span { display: block; }
        .order-products { padding: 4px 0; }
        .order-product-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 0;
            font-size: 0.9rem;
            border-bottom: 1px dashed #f1f5f9;
        }
        .order-product-row:last-child { border-bottom: none; }
        .order-product-name { color: var(--text-color); }
        .order-product-qty { color: var(--text-muted); font-size: 0.85rem; }
        .order-product-subtotal { font-weight: 600; color: var(--text-color); white-space: nowrap; }
        .delivery-badge {
            display: inline-block;
            background: #f0fdf4;
            color: #16a34a;
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Flics<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-arrow-left"></i> Volver a Tienda</a></li>
                <li><span id="user-name-display" style="font-weight: 600; color: var(--primary-color);"></span></li>
                <li><a href="#" id="btn-logout-cliente" style="color: var(--accent-color); font-weight: bold; text-decoration: none;">Salir</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="history-header">
            <h1><i class="fas fa-box-open" style="color: var(--primary-color);"></i> Mis Pedidos</h1>
            <p class="text-muted">Historial y seguimiento de tus compras</p>
        </div>
        <div id="orders-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historial-pedidos.js"></script>
</body>
</html>
