<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Tienda Flic's</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-img-top { height: 200px; object-fit: cover; background-color: #e9ecef; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🛒 Tienda Flic's</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Nuestro Catálogo</h2>
        
        <div class="row" id="contenedor-productos">
            <div class="col-12 text-center" id="mensaje-carga">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2">Conectando con el servidor Spring Boot...</p>
            </div>
        </div>
    </div>

    <script>
        // URL de tu API en Spring Boot
        const API_URL = 'http://localhost:8080/api/productos';

        // Función principal para obtener y mostrar productos
        async function cargarProductos() {
            try {
                // 1. Llamar al backend
                const respuesta = await fetch(API_URL);
                
                // 2. Verificar si la respuesta es correcta
                if (!respuesta.ok) {
                    throw new Error('Error al conectar con el servidor');
                }

                // 3. Convertir la respuesta a JSON
                const productos = await respuesta.json();
                
                // 4. Seleccionar el contenedor en el HTML
                const contenedor = document.getElementById('contenedor-productos');
                contenedor.innerHTML = ''; // Limpiar mensaje de carga

                // 5. Recorrer el array de productos y crear el HTML para cada uno
                productos.forEach(producto => {
                    const tarjetaHTML = `
                        <div class="col-md-4 col-sm-6 mb-4">
                            <div class="card h-100 shadow-sm">
                                <div class="card-img-top d-flex align-items-center justify-content-center text-muted">
                                    <span>FOTO: ${producto.nombre}</span>
                                </div>
                                <div class="card-body">
                                    <span class="badge bg-secondary mb-2">${producto.categoria.nombre}</span>
                                    <h5 class="card-title">${producto.nombre}</h5>
                                    <p class="card-text text-muted small">${producto.descripcion}</p>
                                    <h4 class="text-success">S/ ${producto.precioVenta.toFixed(2)}</h4>
                                    <p class="card-text mb-0"><small>Stock disponible: <strong>${producto.stock}</strong></small></p>
                                </div>
                                <div class="card-footer bg-white border-top-0">
                                    <button class="btn btn-outline-primary w-100" onclick="agregarAlCarrito(${producto.idProducto})">
                                        Agregar al carrito
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    // Insertar la tarjeta en el contenedor
                    contenedor.innerHTML += tarjetaHTML;
                });

            } catch (error) {
                console.error("Hubo un problema con la petición Fetch:", error);
                document.getElementById('contenedor-productos').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        No se pudo cargar el catálogo. Verifica que tu servidor Spring Boot esté encendido.
                    </div>
                `;
            }
        }

        // Función simulada para el botón
        function agregarAlCarrito(idProducto) {
            alert("Producto ID " + idProducto + " listo para agregar al carrito local.");
        }

        // Ejecutar la función apenas cargue la página
        document.addEventListener("DOMContentLoaded", cargarProductos);
    </script>
</body>
</html>
