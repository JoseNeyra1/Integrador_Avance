<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Personal | Flics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-intranet">

    <div class="admin-login-wrapper">
        
        <div class="admin-image-panel">
            <h1>Sistema Integrado<br>de Gestión</h1>
            <p>Plataforma de administración de inventario, punto de venta y control de pedidos en tiempo real para el personal de Flics.</p>
        </div>

        <div class="admin-form-panel">
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i> Solo Personal Autorizado
            </div>
            
            <a href="index.html" class="logo">Flics<span>.</span></a>
            <h2>Acceso a Intranet</h2>
            
            <div class="input-group">
                <input type="text" id="login-id" placeholder="ID de Empleado (Ej: admin)">
                <i class="fas fa-user"></i>
            </div>
            
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <i class="fas fa-lock"></i>
            </div>
            
            <p id="login-error" style="color: #ef4444; font-size: 13.5px; font-weight: 500; margin: -5px 0 15px 0; min-height: 20px;"></p>
            
            <button id="btn-ingresar" class="btn-admin-login w-100">
                Iniciar Sesión Segura <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
            
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver a la tienda pública</a>
        </div>

    </div>

    <script src="js/login-personal.js"></script>
</body>
</html>
