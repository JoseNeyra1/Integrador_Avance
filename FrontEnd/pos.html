<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta | Flics POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background-color: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .pos-navbar { background: var(--secondary-color); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .pos-navbar .logo { color: white; font-size: 1.5rem; text-decoration: none; font-weight: bold; }
        
        .pos-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Panel Izquierdo: Productos */
        .pos-products-panel { flex: 2; padding: 20px; overflow-y: auto; }
        .pos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .pos-item { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
        .pos-item:hover { border-color: var(--primary-color); transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .pos-item-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; height: 40px; overflow: hidden; }
        .pos-item-price { color: var(--primary-dark); font-weight: bold; }
        
        /* Panel Derecho: Boleta */
        .pos-ticket-panel { flex: 1; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .ticket-header { padding: 15px; border-bottom: 1px solid #e2e8f0; font-weight: bold; font-size: 1.1rem; text-align: center; }
        .ticket-items { flex: 1; overflow-y: auto; padding: 10px; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dashed #e2e8f0; font-size: 0.9rem; }
        .ticket-row-title { flex: 2; font-weight: 500; }
        .ticket-row-qty { flex: 1; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .ticket-row-price { flex: 1; text-align: right; font-weight: bold; }
        .btn-qty { background: #f1f5f9; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; }
        
        .ticket-footer { padding: 20px; border-top: 1px solid #e2e8f0; background: #f8fafc; }
        .ticket-total { display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; color: var(--secondary-color); }
        
        .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-pay { padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; color: white; }
        .bg-cash { background-color: #22c55e; }
        .bg-yape { background-color: #742284; }
    </style>
</head>
<body>

    <div class="pos-navbar">
        <a href="#" class="logo">Flics POS</a>
        <div>
            <span id="pos-user-name" style="margin-right: 15px; font-weight: 500;"><i class="fas fa-user-circle"></i> Cargando...</span>
            <button id="btn-logout" class="btn-primary-outline" style="border-color: white; color: white; padding: 6px 12px;"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>

    <div class="pos-container">
        <div class="pos-products-panel">
            <input type="text" id="pos-search" placeholder="🔍 Buscar producto o escanear código de barras..." style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem;">
            <div id="pos-grid" class="pos-grid">
                </div>
        </div>

        <div class="pos-ticket-panel">
            <div class="ticket-header">
                Boleta de Venta
            </div>
            <div id="ticket-items" class="ticket-items">
                <p style="text-align: center; color: #94a3b8; margin-top: 20px; font-size: 0.9rem;">Agregue productos para comenzar</p>
            </div>
            <div class="ticket-footer">
                <div class="ticket-total">
                    <span>TOTAL</span>
                    <span id="ticket-total-price">S/ 0.00</span>
                </div>
                <div class="payment-methods">
                    <button class="btn-pay bg-cash" onclick="procesarVenta(1)">💵 Efectivo</button>
                    <button class="btn-pay bg-yape" onclick="procesarVenta(2)">📱 Yape</button>
                </div>
                <button class="btn-pay w-100" style="background-color: #ef4444;" onclick="limpiarBoleta()">🗑️ Cancelar Venta</button>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="modal">
        <div class="modal-content" style="max-width:400px;">
            <h2 style="text-align:center;"><i class="fas fa-receipt"></i> Venta Registrada</h2>
            <div id="receipt-details" style="text-align:center;margin:20px 0;"></div>
            <button id="btn-new-sale" class="btn-primary w-100">Nueva Venta</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pos.js"></script>
</body>
</html>
