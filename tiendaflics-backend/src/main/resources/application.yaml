spring:
  datasource:
    # useSSL=true: TiDB Cloud Serverless exige TLS en su endpoint publico; MySQL 8 local/Docker
    # tambien acepta TLS (certificado autofirmado) por defecto, asi que el mismo valor sirve
    # para ambos entornos. enabledTLSProtocols evita que un driver viejo intente TLSv1/1.1
    # (deprecados y rechazados por TiDB Cloud).
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:TiendaFlic_db}?useSSL=true&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin123}
    hikari:
      # TiDB Cloud Serverless permite hasta 400 conexiones concurrentes (antes: 3, limite del
      # proveedor gratuito anterior que ya no existe). 10 es un default razonable para el
      # tamaño de este proyecto; se puede subir mas via DB_POOL_SIZE si hace falta.
      maximum-pool-size: ${DB_POOL_SIZE:10}
  jpa:
    hibernate:
      # Flyway es la única fuente de verdad del esquema; Hibernate solo valida que coincida.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    # Sin valor por defecto real a propósito: un secreto fijo en el código permite forjar
    # tokens válidos. Si JWT_SECRET no está definido, JwtService genera uno aleatorio al
    # arrancar (ver JwtService.resolveKey) en vez de usar un valor público y predecible.
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: tiendaflics-backend
