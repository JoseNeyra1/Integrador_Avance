spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:TiendaFlic_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin123}
    hikari:
      # Muchos proveedores gratuitos de MySQL (ej. Clever Cloud DEV) limitan el usuario a
      # pocas conexiones simultaneas; el default de HikariCP (10) se pasa de ese limite.
      maximum-pool-size: ${DB_POOL_SIZE:3}
  jpa:
    hibernate:
      # Flyway es la única fuente de verdad del esquema; Hibernate solo valida que coincida.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    # Sin valor por defecto real a propósito: un secreto fijo en el código permite forjar
    # tokens válidos. Si JWT_SECRET no está definido, JwtService genera uno aleatorio al
    # arrancar (ver JwtService.resolveKey) en vez de usar un valor público y predecible.
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: tiendaflics-backend
