spring:
  datasource:
    url: jdbc:h2:mem:tiendaflics-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-solo-para-pruebas-automatizadas-1234567890
    expiration-ms: 3600000
  cors:
    allowed-origins: http://localhost:5500
